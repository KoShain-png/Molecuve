<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collection — Molecuve</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-logo" onclick="location.href='index.html'">MOLECUVE</div>
  <div class="nav-links">
    <a href="products.html">Collection</a>
    <a href="index.html#about">About</a>
    <a href="index.html#contact">Contact</a>
  </div>
  <button class="cart-btn" id="cart-count" onclick="openCart()">Cart (0)</button>
</nav>

<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="women">Women</button>
  <button class="filter-btn" data-cat="men">Men</button>
  <button class="filter-btn" data-cat="kids">Kids</button>
  <button class="filter-btn" data-cat="accessories">Accessories</button>
</div>

<div class="product-grid" id="product-grid">
  <div class="loading">Loading collection...</div>
</div>

<footer>
  <span>© 2025 Molecuve</span>
  <span class="footer-logo">MOLECUVE</span>
  <span>Yangon, Myanmar</span>
</footer>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <span class="cart-title">Your Cart</span>
    <button class="cart-close" onclick="closeCart()">×</button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer" id="cart-footer" style="display:none;">
    <div class="cart-total">
      <span>Total</span>
      <span id="cart-total-price">0 MMK</span>
    </div>
    <button class="checkout-btn" onclick="location.href='checkout.html'">Proceed to Checkout</button>
  </div>
</div>

<div class="toast"></div>

<script src="js/config.js"></script>
<script>
  let allProducts = [];
  let activeCategory = 'all';
  cart.updateCount();

  // Check URL param for category
  const urlCat = new URLSearchParams(location.search).get('cat');
  if (urlCat) activeCategory = urlCat.toLowerCase();

  async function loadProducts() {
    try {
      const res = await api.get('/api/products');
      allProducts = res.data || [];
      renderProducts();
    } catch (e) {
      document.getElementById('product-grid').innerHTML = '<div class="loading">Could not load products.</div>';
    }
  }

  function renderProducts() {
    const grid = document.getElementById('product-grid');
    const filtered = activeCategory === 'all'
      ? allProducts
      : allProducts.filter(p => p.category.toLowerCase() === activeCategory);

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="loading">No products in this category.</div>';
      return;
    }
    grid.innerHTML = '';
    filtered.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.onclick = () => location.href = `product.html?id=${p.id}`;
      const bgClass = { Women: 'bg-w', Men: 'bg-m', Kids: 'bg-k', Accessories: 'bg-a' }[p.category] || 'bg-w';
      card.innerHTML = `
        <div class="product-img ${bgClass}">
          ${p.image_url ? `<img src="${imgSrc(p.image_url)}" alt="${p.name}">` : '👗'}
        </div>
        <div class="product-info">
          ${p.is_new ? '<span class="badge-new">New</span><br>' : ''}
          <div class="product-tag">${p.category}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">${formatPrice(p.price)}</div>
        </div>`;
      grid.appendChild(card);
    });
  }

  // Filter buttons
  document.getElementById('filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    renderProducts();
  });

  // Set active filter from URL
  document.querySelectorAll('.filter-btn').forEach(btn => {
    if (btn.dataset.cat === activeCategory) btn.classList.add('active');
    else btn.classList.remove('active');
  });

  function openCart() {
    document.getElementById('cart-overlay').classList.add('open');
    document.getElementById('cart-sidebar').classList.add('open');
    renderCartSidebar();
  }
  function closeCart() {
    document.getElementById('cart-overlay').classList.remove('open');
    document.getElementById('cart-sidebar').classList.remove('open');
  }
  function renderCartSidebar() {
    const list = document.getElementById('cart-items-list');
    const footer = document.getElementById('cart-footer');
    if (cart.items.length === 0) {
      list.innerHTML = '<div class="cart-empty">Your cart is empty.</div>';
      footer.style.display = 'none'; return;
    }
    footer.style.display = 'block';
    list.innerHTML = cart.items.map(i => `
      <div class="cart-item">
        <div class="cart-item-img">${i.product.image_url ? `<img src="${imgSrc(i.product.image_url)}" alt="${i.product.name}">` : '👗'}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${i.product.name}</div>
          <div class="cart-item-meta">Size: ${i.size} · Qty: ${i.qty}</div>
          <div class="cart-item-price">${formatPrice(i.product.price * i.qty)}</div>
        </div>
        <button class="cart-item-remove" onclick="removeFromCart('${i.key}')">×</button>
      </div>`).join('');
    document.getElementById('cart-total-price').textContent = formatPrice(cart.total());
  }
  function removeFromCart(key) { cart.remove(key); renderCartSidebar(); }

  loadProducts();
</script>
</body>
</html>
