<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Molecuve — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="dashboard-page">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <span class="logo">MOLECUVE</span>
      <span class="admin-tag">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active">Products</a>
      <a href="#" class="nav-item">Orders</a>
      <a href="#" class="nav-item">Customers</a>
    </nav>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </aside>

  <!-- Main -->
  <main class="main-content">
    <div class="main-header">
      <h1>Products</h1>
      <button class="btn-primary" onclick="openAddModal()">+ Add Product</button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-label">Total Products</span>
        <span class="stat-value" id="totalProducts">—</span>
      </div>
    </div>

    <!-- Alert -->
    <div id="alertMsg" class="alert-success" style="display:none"></div>

    <!-- Products Table -->
    <div class="table-wrapper">
      <div id="tableLoading" class="loading-state">
        <div class="spinner"></div>
        <p>Loading products...</p>
      </div>
      <table class="products-table" id="productsTable" style="display:none">
        <thead>
          <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Image</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>

  <!-- Add Product Modal -->
  <div class="modal-overlay" id="addModal" onclick="closeAddModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2>Add Product</h2>
        <button class="modal-close" onclick="closeAddModal()">×</button>
      </div>

      <div id="formError" class="alert-error" style="display:none"></div>

      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" id="addName" placeholder="e.g. Linen Shirt" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (USD) *</label>
          <input type="number" id="addPrice" placeholder="49.00" step="0.01" min="0" />
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="addCategory">
            <option value="">Select category</option>
            <option value="tops">Tops</option>
            <option value="bottoms">Bottoms</option>
            <option value="outerwear">Outerwear</option>
            <option value="accessories">Accessories</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="url" id="addImage" placeholder="https://..." />
      </div>

      <div class="modal-footer">
        <button class="btn-outline" onclick="closeAddModal()">Cancel</button>
        <button class="btn-primary" id="addBtn" onclick="addProduct()">Add Product</button>
      </div>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
